<article class="post">
  {{ .Render "header" }}
  <div class="content">
    {{ .Render "featured" }}
  </div>
  <footer>
    {{ $readMore := i18n "read_more" }}<a href="{{ .RelPermalink }}" class="button big" aria-label="{{ .Title }} - {{ $readMore }}">{{ $readMore }}</a>
    {{ .Render "blog-stats" }}
  </footer>
</article>
